name: Keep Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (15m idle limit)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://coderecall.onrender.com/ > /dev/null
          echo "Pinged https://coderecall.onrender.com/ successfully."
